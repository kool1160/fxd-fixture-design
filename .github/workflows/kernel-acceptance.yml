{
  "name": "Kernel acceptance",
  "on": {
    "workflow_dispatch": {},
    "push": {
      "branches": ["main"],
      "paths": [
        "fxd_geometry/**",
        "tests/**",
        "scripts/**",
        "requirements-kernel.txt",
        ".github/workflows/kernel-acceptance.yml"
      ]
    },
    "pull_request": {
      "paths": [
        "fxd_geometry/**",
        "tests/**",
        "scripts/**",
        "requirements-kernel.txt",
        ".github/workflows/kernel-acceptance.yml"
      ]
    }
  },
  "permissions": {
    "contents": "read",
    "issues": "write"
  },
  "jobs": {
    "ocp-acceptance": {
      "name": "Pinned OCP acceptance",
      "runs-on": "ubuntu-latest",
      "timeout-minutes": 20,
      "steps": [
        {
          "name": "Check out repository",
          "uses": "actions/checkout@v4"
        },
        {
          "name": "Set up Python 3.12",
          "uses": "actions/setup-python@v5",
          "with": {
            "python-version": "3.12"
          }
        },
        {
          "name": "Upgrade packaging tools",
          "run": "python -m pip install --upgrade pip setuptools wheel"
        },
        {
          "name": "Install pinned OCP wheel",
          "run": "python -m pip install --only-binary=:all: -r requirements-kernel.txt"
        },
        {
          "name": "Prove pinned runtime",
          "run": "python -c \"import OCP; actual=str(getattr(OCP, '__version__', 'unknown')); print('OCP runtime:', actual); assert actual.startswith('7.9.3.1'), actual\""
        },
        {
          "id": "validation",
          "name": "Run repository validation",
          "shell": "bash",
          "run": "set +e\nbash scripts/ci.sh 2>&1 | tee kernel-ci.log\nstatus=${PIPESTATUS[0]}\necho \"exit_code=$status\" >> \"$GITHUB_OUTPUT\"\nexit 0"
        },
        {
          "name": "Report diagnostic result",
          "if": "always()",
          "shell": "bash",
          "env": {
            "GH_TOKEN": "${{ github.token }}"
          },
          "run": "{\n  echo \"## Kernel acceptance run $GITHUB_RUN_NUMBER\"\n  echo\n  echo \"Commit: $GITHUB_SHA\"\n  echo \"Exit code: ${{ steps.validation.outputs.exit_code }}\"\n  echo\n  echo '```text'\n  tail -c 60000 kernel-ci.log 2>/dev/null || echo 'Validation log was not created.'\n  echo\n  echo '```'\n} > kernel-report.md\ngh issue comment 27 --repo \"$GITHUB_REPOSITORY\" --body-file kernel-report.md"
        },
        {
          "name": "Enforce validation result",
          "if": "steps.validation.outputs.exit_code != '0'",
          "run": "exit 1"
        }
      ]
    }
  }
}
